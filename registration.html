<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="registration.css">
</head>
<body>
    <div id="sideNav"></div>

    <div class="container">

        <div class="registration-form">
            <form action="">
                <h3>Student Registration</h3><br>
                <span>Complete all field to enroll a new student into the system</span>
                <hr><br>

                <div class="form-row">

                    <div class="input-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" placeholder="Enter first name">
                    </div>

                    <div class="input-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" placeholder="Enter last name">
                    </div>

                </div>
                <div class="form-row">

                    <div class="input-group">
                        <label for="first-name">Date of Birth</label>
                        <input type="date" id="first-name" placeholder="Enter first name">
                    </div>

                    <div class="input-group">
                        <label for="last-name">Gender</label>
                        <select name="" id="">
                            <option disabled selected value="">Choose Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                </div>

                <div class="form-row">

                    <div class="input-group">
                        <label for="first-name">phone number</label>
                        <input type="number" id="first-name" placeholder="Example: 013-2354570">
                    </div>

                    <div class="input-group">
                        <label for="last-name">email</label>
                        <input type="email" id="last-name" placeholder="abc@example.com">
                    </div>

                </div>

                <div class="form-btn">
                    <button class="btn-res" type="reset">Reset</button>
                    <button class="btn-sub" type="submit">Submit</button>
                    
                </div>

            </form>
        </div>

        <div class="registered-std">

            <div class="reg-header">
                <h3>Registered Students</h3>
                <input type="text" placeholder="Quick filter by name">
            </div>
            <hr>
            
        </div>
    </div>



     <script>
        fetch('sideBar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sideNav').innerHTML = data;
            });
     </script>
</body>
</html>
